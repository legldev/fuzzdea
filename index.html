    <script id="fuzzdea-structured-data" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://fuzzdea.com/#organization",
            "name": "fuzzdea",
            "url": "https://fuzzdea.com/",
            "logo": "https://fuzzdea.com/favicon.svg"
          },
          {
            "@type": "WebSite",
            "@id": "https://fuzzdea.com/#website",
            "url": "https://fuzzdea.com/",
            "name": "fuzzdea",
            "description": "Custom software development, web development, AI automation, and staff augmentation for startups, SMBs, and growing teams.",
            "inLanguage": "en",
            "publisher": {
              "@id": "https://fuzzdea.com/#organization"
            }
          },
          {
            "@type": "ProfessionalService",
            "@id": "https://fuzzdea.com/#service",
            "name": "fuzzdea",
            "url": "https://fuzzdea.com/",
            "description": "Custom software development, web development, AI automation, and staff augmentation for startups, SMBs, and growing teams.",

            "availableLanguage": ["en", "es"],

              "Custom software development",
              "Websites and landing pages",
              "Staff augmentation",
              "Support and evolution",
              "AI automation and agents"
            ],

            ]

  </head>
  <body>
    <div id="root"></div>
    <form
      name="contacto"
      method="POST"
      action="/"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="contacto" />
      <input
        type="hidden"
        name="subject"
        value="New lead from %{formName} (%{submissionId})"
        data-remove-prefix
      />
      <input type="hidden" name="language" value="en" />
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="text" name="service_label" />
      <select name="service">
        <option value="custom">Custom software development</option>
        <option value="web">Websites and landing pages</option>
        <option value="augmentation">Staff augmentation</option>
        <option value="support">Support and evolution</option>
        <option value="ai">AI automation and agents</option>
      </select>
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
